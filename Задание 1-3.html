<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Page</title>
</head>
<body>
<table border="0" cellpadding="10">
    <tbody>
    <tr>
        <td>Имя:</td>
        <td>
            <input type="text" placeholder="">
        </td>
    </tr>
    <tr>
        <td>Фамилия:</td>
        <td>
            <input type="text" placeholder="">
        </td>
    </tr>
    <tr>
        <td>Отчество:</td>
        <td>
            <input type="text" placeholder="">
        </td>
    </tr>
    <tr>
        <td>Родной город:</td>
        <td>
            <select>
                <option>Алматы</option>
                <option>Астана</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>Пол:</td>
        <td>
            <input type="radio" name="pol"> Мужской <br>
            <input type="radio" name="pol"> Женский <br>
        </td>
    </tr>
    <tr>
        <td>Дата рождения:</td>
        <td>
            <input type="date">
        </td>
    </tr>
    <tr>
        <td>Образование</td>
        <td>
            <select>
                <option>РФМШ</option>
                <option>КТЛ</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>Баллы ЕНТ:</td>
        <td>
            <input type="text" placeholder="0">
        </td>
    </tr>
    </tbody>
</table>
    <button>Зарегистрировать</button>
</body>
</html>
